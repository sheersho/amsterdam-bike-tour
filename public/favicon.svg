<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Bill's Bike Tour">
  <defs>
    <linearGradient id="leather" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b1263c"/>
      <stop offset="0.52" stop-color="#861728"/>
      <stop offset="1" stop-color="#60111f"/>
    </linearGradient>
    <radialGradient id="gloss" cx="16" cy="14" r="34" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grain" width="6" height="6" patternUnits="userSpaceOnUse">
      <path d="M0 3h6M3 0v6" stroke="#fff" stroke-opacity="0.08" stroke-width="0.6"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#leather)"/>
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#gloss)"/>
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#grain)" opacity="0.6"/>

  <rect x="10" y="10" width="44" height="44" rx="10" fill="none" stroke="#fbe6d4" stroke-opacity="0.72" stroke-width="1.6" stroke-dasharray="2.2 2.2"/>

  <g fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)">
    <circle cx="23" cy="40" r="6.8"/>
    <circle cx="43" cy="40" r="6.8"/>
    <path d="M23 40l8-12h7"/>
    <path d="M31 28l5 12"/>
    <path d="M31 40h12"/>
    <path d="M35.5 28h3"/>
  </g>
</svg>
